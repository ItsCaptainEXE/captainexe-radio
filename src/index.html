<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>CaptainEXE Radio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>

  <div id="app">

    <div id="header">
      <h1>CaptainEXE Radio</h1>
      <p id="status">Loading…</p>
    </div>

    <div id="player-container">
      <iframe id="player" src="" allow="autoplay; encrypted-media"></iframe>
    </div>

    <div id="controls">
      <button onclick="window.playTrack(0)">Embers</button>
      <button onclick="window.playTrack(1)">Afterglow</button>
      <button onclick="window.playLive()">Live</button>
    </div>

    <div id="now-playing">
      <p id="np-info">Nothing playing</p>
    </div>

  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
